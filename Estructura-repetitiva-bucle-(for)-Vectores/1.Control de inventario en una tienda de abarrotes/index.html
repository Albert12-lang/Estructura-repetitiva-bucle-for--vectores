<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Inventario</title>
</head>
<body>
  <h2>Control de Inventario - Tienda de Don Manuel</h2>

  <p>Ingresa el precio de cada producto:</p>

  <!-- Campos para ingresar los precios -->
  <input type="number" id="precio1" placeholder="Arroz"><br>
  <input type="number" id="precio2" placeholder="Azúcar"><br>
  <input type="number" id="precio3" placeholder="Leche"><br>
  <input type="number" id="precio4" placeholder="Pan"><br>
  <input type="number" id="precio5" placeholder="Aceite"><br>
  <input type="number" id="precio6" placeholder="Huevos"><br><br>

  <!-- Botón para ejecutar el cálculo -->
  <button onclick="calcularInventario()">Calcular Inventario</button>

  <!-- Área donde se mostrará el resultado -->
  <h3 id="resultado"></h3>

  <script src="script.js"></script>
</body>
</html>
